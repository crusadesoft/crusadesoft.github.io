<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Crusadesoft</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 52'%3E%3Cpath d='M20 2L38 10V28C38 38 20 50 20 50C20 50 2 38 2 28V10L20 2Z' stroke='%23c9a84c' stroke-width='2' fill='%230a0a14'/%3E%3Cline x1='20' y1='12' x2='20' y2='40' stroke='%23c9a84c' stroke-width='2.5'/%3E%3Cline x1='11' y1='20' x2='29' y2='20' stroke='%23c9a84c' stroke-width='2.5'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8d48b;
            --deep-navy: #0a0a14;
            --cream: #f5f0e8;
            --cream-dim: #d4c9b8;
            --text-secondary: #b5aa96;
        }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: var(--deep-navy);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background: var(--gold);
            color: var(--deep-navy);
        }

        .bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 40%, rgba(139, 26, 26, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
            pointer-events: none;
        }

        /* Faint cross watermark */
        .cross-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.03;
            pointer-events: none;
        }
        .cross-bg::before,
        .cross-bg::after {
            content: '';
            position: absolute;
            background: var(--gold);
        }
        .cross-bg::before {
            width: 60px;
            height: 500px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .cross-bg::after {
            width: 300px;
            height: 60px;
            left: 50%;
            top: 35%;
            transform: translate(-50%, -50%);
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 2rem;
            max-width: 600px;
        }

        .emblem {
            width: 60px;
            height: 78px;
            margin: 0 auto 2.5rem;
            color: var(--gold);
            opacity: 0.8;
        }

        .error-code {
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            font-size: clamp(4rem, 12vw, 8rem);
            line-height: 1;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .error-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--cream-dim);
            margin-bottom: 2rem;
        }

        .divider {
            width: 80px;
            height: 1px;
            margin: 0 auto 2rem;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .error-message {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            font-style: italic;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .return-link {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--gold);
            padding: 1rem 2.5rem;
            border: 1px solid var(--gold);
            transition: all 0.4s ease;
        }
        .return-link:hover {
            background: var(--gold);
            color: var(--deep-navy);
            box-shadow: 0 0 40px rgba(201, 168, 76, 0.25);
        }
        .return-link:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 4px;
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <div class="bg" aria-hidden="true"></div>
    <div class="cross-bg" aria-hidden="true"></div>

    <main class="content">
        <svg class="emblem" viewBox="0 0 40 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M20 2L38 10V28C38 38 20 50 20 50C20 50 2 38 2 28V10L20 2Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <line x1="20" y1="12" x2="20" y2="40" stroke="currentColor" stroke-width="2"/>
            <line x1="11" y1="20" x2="29" y2="20" stroke="currentColor" stroke-width="2"/>
        </svg>

        <h1 class="error-code">404</h1>
        <p class="error-title">Territory Not Found</p>
        <div class="divider" aria-hidden="true"></div>
        <p class="error-message">
            This land has not yet been claimed. The path you seek<br>
            lies beyond the borders of our domain.
        </p>
        <a href="/" class="return-link">Return to the Keep</a>
    </main>

    <script>
        const crispWebsiteId = '49baacf1-9675-4a8d-85dd-2d34f87c1781';

        if (crispWebsiteId) {
            window.$crisp = [];
            window.CRISP_WEBSITE_ID = crispWebsiteId;

            (function() {
                const documentHead = document.getElementsByTagName('head')[0];
                const crispScript = document.createElement('script');
                crispScript.src = 'https://client.crisp.chat/l.js';
                crispScript.async = true;
                documentHead.appendChild(crispScript);
            })();
        }
    </script>
</body>
</html>
